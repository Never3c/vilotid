<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViloTid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>ViloTid</h1>
    <p>Digital vilotidsbok för yrkesförare</p>
</header>

<main>

    <section class="card">
        <h2>Status</h2>

        <div class="status-box">
            <p><strong>Aktivitet:</strong> <span id="currentActivity">Ingen</span></p>
            <p><strong>Tid:</strong> <span id="timer">00:00:00</span></p>
        </div>

        <div class="buttons">
            <button onclick="startActivity('Körning')">Start Körning</button>
            <button onclick="startActivity('Rast')">Start Rast</button>
            <button onclick="startActivity('Vila')">Start Vila</button>
            <button class="stop" onclick="stopActivity()">Stoppa</button>
        </div>
    </section>

    <section class="card">
        <h2>Dagens sammanställning</h2>

        <div class="summary">
            <p>Körning: <span id="driveTotal">0 min</span></p>
            <p>Rast: <span id="breakTotal">0 min</span></p>
            <p>Vila: <span id="restTotal">0 min</span></p>
        </div>
    </section>

    <section class="card">
        <h2>Historik</h2>

        <ul id="historyList"></ul>

        <button onclick="exportCSV()">Exportera CSV</button>
    </section>

</main>

<script src="app.js"></script>
<script src="auth.js"></script>
</body>
</html>
